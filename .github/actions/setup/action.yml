name: "Project Setup"
description: "Handles Node.js setup and Yarn installation with caching"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.2
        cache: "yarn"

    - name: Install dependencies
      run: yarn install --frozen-lockfile
      shell: bash
